name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: >
          flutter build apk --release
          --dart-define=APP_ENV=production
          --dart-define=API_BASE_URL=https://api.karakheti.de
          --dart-define=KEYCLOAK_URL=https://auth.karakheti.de
          --dart-define=KEYCLOAK_REALM=cleaning-system
          --dart-define=KEYCLOAK_CLIENT_ID=cleaning-system-local
          --dart-define=REDIRECT_URL=https://app.karakheti.de/

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk cleaning-app-android.apk

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cleaning-app-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleaning-app-android
          path: cleaning-app-android.apk

  windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app
        run: >
          flutter build windows --release
          --dart-define=APP_ENV=production
          --dart-define=API_BASE_URL=https://api.karakheti.de
          --dart-define=KEYCLOAK_URL=https://auth.karakheti.de
          --dart-define=KEYCLOAK_REALM=cleaning-system
          --dart-define=KEYCLOAK_CLIENT_ID=cleaning-system-local
          --dart-define=REDIRECT_URL=https://app.karakheti.de/

      - name: Zip Windows app
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath cleaning-app-windows.zip

      - name: Upload Windows zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cleaning-app-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: cleaning-app-windows
          path: cleaning-app-windows.zip
