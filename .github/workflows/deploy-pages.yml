name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build web
        run: >
          flutter build web --release --base-href /
          --dart-define=APP_ENV=production
          --dart-define=API_BASE_URL=https://api.karakheti.de
          --dart-define=KEYCLOAK_URL=https://auth.karakheti.de
          --dart-define=KEYCLOAK_REALM=cleaning-system
          --dart-define=KEYCLOAK_CLIENT_ID=cleaning-system-local
          --dart-define=REDIRECT_URL=https://projectreinigung.github.io/Flutter_frontend/

      - name: Add GitHub Pages SPA fallback
        run: |
          cp build/web/index.html build/web/404.html
          touch build/web/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
